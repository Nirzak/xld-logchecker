name: Build and Release

on:
  push:
    tags: [ "v*" ]

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0 # Ensure statically linked binaries
        run: |
          go build -ldflags="-s -w" -o xld-logchecker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/xld-logchecker

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: xld-logchecker-${{ matrix.os }}-${{ matrix.arch }}
          path: xld-logchecker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: xld-logchecker-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
